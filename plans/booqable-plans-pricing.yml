specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Booqable
providerId: booqable
created: '2026-07-03'
modified: '2026-07-03'
reconciled: false
tags:
- Rental Management
- Inventory
- Equipment Rental
- Bookings
- Plans
description: >-
  Booqable is sold as a SaaS subscription to the rental-management platform; the
  API is included with every plan rather than metered or billed separately.
  There are three published subscription tiers - Essential, Pro, and Premium -
  each billed monthly (with discounted annual billing) and differentiated by the
  number of included active users, feature depth, locations, and support. Every
  plan includes a 14-day free trial, unlimited inventory and orders, and takes no
  commission on bookings. Prices below are list monthly prices in USD and may
  vary by billing period, region, and promotions.
notes: >-
  Booqable does not price API access as a separate product; the REST API (v4)
  and webhooks are available to subscribers. Confirm current tier pricing, user
  counts, and feature limits on the Booqable pricing page during reconciliation.
sources:
- https://booqable.com/pricing/
- https://developers.booqable.com/
- https://help.booqable.com/en/articles/4325485-how-to-create-an-api-key
