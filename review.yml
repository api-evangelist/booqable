aid: booqable
name: Booqable
review:
  question: Does Booqable expose a documented public WebSocket API?
  answer: false
  date: '2026-07-03'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    No AsyncAPI document was authored. Booqable's public API surface is
    request/response REST following the JSON:API specification over HTTPS. The
    only asynchronous, server-initiated mechanism Booqable documents is
    webhooks - the platform POSTs event payloads to a subscriber-configured
    HTTPS endpoint. There is no documented WebSocket (ws:// or wss://) or SSE
    transport on Booqable's own API to model. Webhooks are server-to-endpoint
    HTTP callbacks, not a bidirectional streaming socket, so no AsyncAPI channel
    document was created.
findings:
  summary: |
    Booqable does not publish a documented public WebSocket API. Booqable is
    equipment and inventory rental management software. Its developer API (v4,
    "Boomerang") is a RESTful, JSON:API-compliant interface reached at a
    company-specific host, https://{company}.booqable.com/api/4, authenticated
    with an access token (Bearer) or a signed single-use request. A legacy v1
    API also remains documented. All resource access - orders, products,
    product groups, customers, stock items, availabilities, plannings,
    documents, payments, bundles, collections, locations, tax rates, coupons,
    and webhooks - is plain request/response REST. Booqable's only push mechanism
    is webhooks, which deliver server-to-endpoint HTTPS POST callbacks when
    resources change. No realtime, bidirectional, or streaming WebSocket
    endpoint is documented anywhere in Booqable's API reference as of the review
    date.
  openSource: |
    Booqable's platform is a proprietary hosted SaaS and is not open source.
    Booqable does maintain public helper repositories on GitHub
    (github.com/booqable), including the api-documentation source, a Ruby
    toolkit (booqable.rb), and a WordPress plugin, but the rental platform
    itself is closed-source and available only as a managed subscription.
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://{company}.booqable.com/api/4
      documented: true
      note: JSON:API-compliant REST API (v4 "Boomerang"). Bearer access token or signed request auth. Legacy v1 API also documented.
    - protocol: Webhook
      scheme: https
      documented: true
      note: Booqable POSTs event payloads to a subscriber-configured HTTPS endpoint when resources change. Server-to-endpoint HTTP, not WebSocket.
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint is documented anywhere in Booqable's v4 or v1 API reference as of the review date.
