actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists on Booqable's own API. Booqable's public
    API is request/response REST (JSON:API), and its only asynchronous mechanism
    is webhooks - server-to-endpoint HTTPS callbacks, not a bidirectional
    socket. No AsyncAPI document was created because there is no server-push
    streaming transport to model; the webhooks are captured as a REST resource
    and a documented callback transport in apis.yml and the OpenAPI.
