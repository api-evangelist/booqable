sources:
  - url: https://developers.booqable.com/
    type: Documentation
    note: Booqable API v4 ("Boomerang") reference - JSON:API, company-specific host, Bearer/signed auth. No WebSocket mentioned.
  - url: https://developers.booqable.com/v1.html
    type: Documentation
    note: Legacy v1 API reference; REST with api_key query parameter. No WebSocket.
  - url: https://github.com/booqable/api-documentation
