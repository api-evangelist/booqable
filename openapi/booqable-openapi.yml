components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: >-
        An access token created in Booqable account settings, sent as
        "Authorization: Bearer <token>". Booqable also supports request signing
        (single-use signed tokens using ES256, RS256, or HS256) and, on the
        legacy v1 API, an api_key query parameter.
  parameters:
    Id:
      name: id
      in: path
      required: true
      description: The UUID of the resource.
      schema: { type: string }
    Include:
      name: include
      in: query
      required: false
      description: Comma-separated list of related resources to sideload (JSON:API include).
      schema: { type: string }
    PageNumber:
      name: page[number]
      in: query
      required: false
      description: The page number to return (JSON:API pagination).
      schema: { type: integer, minimum: 1, default: 1 }
    PageSize:
      name: page[size]
      in: query
      required: false
      description: Number of records per page. Defaults to 25.
      schema: { type: integer, minimum: 1, default: 25 }
  requestBodies:
    ResourceBody:
      required: true
      description: A JSON:API document wrapping the resource under a "data" member.
      content:
        application/vnd.api+json:
          schema: { $ref: '#/components/schemas/ResourceDocument' }
  responses:
    Unauthorized:
      description: Authentication is missing or invalid.
      content:
        application/vnd.api+json:
          schema: { $ref: '#/components/schemas/ErrorDocument' }
    NotFound:
      description: The requested resource does not exist.
      content:
        application/vnd.api+json:
          schema: { $ref: '#/components/schemas/ErrorDocument' }
    UnprocessableEntity:
      description: The request was well-formed but failed validation.
      content:
        application/vnd.api+json:
          schema: { $ref: '#/components/schemas/ErrorDocument' }
    TooManyRequests:
      description: Rate limit exceeded. "You're doing too many requests! Slow down!"
      content:
        application/vnd.api+json:
          schema: { $ref: '#/components/schemas/ErrorDocument' }
  schemas:
    ResourceIdentifier:
      type: object
      properties:
        type: { type: string, description: The JSON:API resource type (for example "orders"). }
        id: { type: string, description: The resource UUID. }
    Resource:
      type: object
      description: A JSON:API resource object.
      properties:
        type: { type: string }
        id: { type: string }
        attributes: { type: object, additionalProperties: true }
        relationships: { type: object, additionalProperties: true }
    ResourceDocument:
      type: object
      description: A JSON:API document containing a single primary resource.
      properties:
        data: { $ref: '#/components/schemas/Resource' }
        included:
          type: array
          items: { $ref: '#/components/schemas/Resource' }
        meta: { type: object, additionalProperties: true }
    ResourceCollection:
      type: object
      description: A JSON:API document containing a collection of resources.
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Resource' }
        included:
          type: array
          items: { $ref: '#/components/schemas/Resource' }
        meta:
          type: object
          description: Metadata such as total_count and pagination stats.
          additionalProperties: true
        links: { type: object, additionalProperties: true }
    ErrorDocument:
      type: object
      description: A JSON:API error document.
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              status: { type: string }
              code: { type: string }
              title: { type: string }
              detail: { type: string }
