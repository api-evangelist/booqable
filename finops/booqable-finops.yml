principles:
- name: Visibility
  description: Track which plan tier and how many active users the account is billed for; API usage carries no separate meter to monitor.
- name: Allocation
  description: Attribute the subscription cost to the rental operation or team using it; there is no per-endpoint cost to split.
- name: Optimization
  description: Right-size the plan tier and active-user count to actual needs and prefer annual billing for the discount; avoid over-provisioning users.
- name: Accountability
  description: Assign an owner to review the subscription at renewal against feature usage and headcount.
