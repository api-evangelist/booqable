description: >-
  FinOps view of Booqable spend. Booqable is a flat-rate SaaS subscription -
  cost is driven by the chosen plan tier (Essential, Pro, Premium) and the
  number of active users, billed monthly or annually, not by API call volume.
  The REST API and webhooks are included with the subscription at no incremental
  metered charge, so API usage does not directly generate variable cost. The
  primary cost levers are the plan tier, active-user count, and billing period
  (annual billing is discounted versus monthly).
notes: >-
  Because API access is bundled into the subscription, there is no per-request
  invoice to allocate; FinOps attention is on choosing the right tier and user
  count. Confirm current tier prices and per-user policies on the Booqable
  pricing page.
