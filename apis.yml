aid: booqable
url: https://raw.githubusercontent.com/api-evangelist/booqable/refs/heads/main/apis.yml
name: Booqable
kind: company
description: Booqable is equipment and inventory rental management software for rental
  businesses - it handles online bookings, product and stock-item inventory, orders,
  scheduling and availability, documents and invoicing, payments, and a customer-facing
  online store. Booqable exposes a documented REST API (v4, "Boomerang") that follows
  the JSON:API specification. Requests are directed to a company-specific host,
  https://{company}.booqable.com/api/4, and authenticated with an access token
  (Bearer) or a signed single-use request. A legacy v1 API remains documented. The
  API lets developers manage orders, products, product groups, customers, stock
  items, availability and plannings, documents, payments, and webhooks.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Rental Management
- Inventory
- Equipment Rental
- Bookings
- Orders
- E-commerce
- JSON:API
created: '2026-07-03'
modified: '2026-07-03'
